[pytest]
pythonpath = . twim
testpaths = tests evals
addopts = -q
markers =
    slow: runs local ML models (e.g. faster-whisper); skip with -m "not slow"
    requires_ollama: needs Ollama at OLLAMA_HOST with cleanup/judge models pulled
    geval_judge: optional DeepEval GEval rubric; requires VOICE_DICTATION_RUN_GEVAL=1
